name: Deploy Dafny Files to S3

on:
  push:
    branches: [main]
    paths:
      - 'dfy-files/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  S3_BUCKET: ${{ secrets.DFY_BUCKET }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync Dafny files to S3
        run: |
          aws s3 sync ./dfy-files/ s3://${S3_BUCKET}/dfy-files/ \
            --exclude "*" \
            --include "*.dfy" \
            --delete
          echo "Uploaded files to s3://${S3_BUCKET}/dfy-files/"

      - name: Trigger CodePipeline
        run: |
          aws codepipeline start-pipeline-execution \
            --name dafny-verification-pipeline
